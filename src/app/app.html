<div class="min-h-dvh bg-neutral-950 text-neutral-100">
  <header
    class="sticky top-0 z-20 border-b border-neutral-800 bg-neutral-950/95 backdrop-blur supports-[backdrop-filter]:bg-neutral-950/80"
  >
    <div class="flex min-h-16 items-center gap-3 px-4 sm:px-6">
      <button
        type="button"
        class="grid size-10 place-items-center border border-neutral-700 bg-neutral-900 text-neutral-100 hover:bg-neutral-800 focus:outline-none focus:ring-2 focus:ring-emerald-400"
        [attr.aria-expanded]="isNavOpen()"
        aria-controls="experiment-navigation"
        aria-label="Toggle navigation"
        (click)="toggleNav()"
      >
        <span aria-hidden="true" class="text-xl leading-none">{{ isNavOpen() ? '×' : '☰' }}</span>
      </button>

      <div class="min-w-0">
        <p class="text-xs font-semibold uppercase tracking-wide text-emerald-300">Deep Agents</p>
        <h1 class="truncate text-lg font-semibold text-white">TypeScript SDK Workbench</h1>
      </div>
    </div>
  </header>

  <div class="grid min-h-[calc(100dvh-4rem)] grid-cols-1 lg:grid-cols-[auto_1fr]">
    <aside
      id="experiment-navigation"
      class="border-b border-neutral-800 bg-neutral-950 lg:border-b-0 lg:border-r"
      [class.hidden]="!isNavOpen()"
    >
      <nav
        class="w-full p-3 lg:h-[calc(100dvh-4rem)] lg:w-72 lg:overflow-y-auto"
        aria-label="Experiments"
      >
        @for (section of sections; track section.title) {
          <section class="mb-5 last:mb-0">
            <h2 class="px-3 pb-2 text-xs font-semibold uppercase tracking-wide text-neutral-500">
              {{ section.title }}
            </h2>
            <div class="space-y-1">
              @for (experiment of section.experiments; track experiment.id) {
                <a
                  class="block border border-transparent px-3 py-2 text-sm text-neutral-300 hover:border-neutral-700 hover:bg-neutral-900 hover:text-white focus:outline-none focus:ring-2 focus:ring-emerald-400"
                  [routerLink]="['/experiments', experiment.id]"
                  routerLinkActive="border-emerald-500/60 bg-emerald-950/40 text-emerald-100"
                  [routerLinkActiveOptions]="{ exact: true }"
                >
                  <span class="block font-medium">{{ experiment.title }}</span>
                  <span class="mt-0.5 block text-xs text-neutral-500">{{ experiment.status }}</span>
                </a>
              }
            </div>
          </section>
        }
      </nav>
    </aside>

    <main class="min-w-0">
      <router-outlet />
    </main>
  </div>
</div>
